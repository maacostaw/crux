spring.application.name=javaservice
server.port=8080

# Carga el .env de dev (url/username/password de la BD) si existe.
# En Docker/prod estas mismas propiedades llegan por variables de entorno
# (SPRING_DATASOURCE_*) via relaxed binding, sin necesidad del .env.
spring.config.import=optional:file:./.env[.properties]

# PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
